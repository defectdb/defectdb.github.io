<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Order — two runners racing toward one function call, a question mark over who goes first">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="53" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- finish gate: the function call f(...) -->
    <rect x="540" y="120" width="240" height="220" rx="16"/>
    <line x1="560" y1="120" x2="560" y2="340" opacity="0.5" stroke-width="2.4"/>
    <line x1="760" y1="120" x2="760" y2="340" opacity="0.5" stroke-width="2.4"/>
    <text x="660" y="245" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="44" fill="#1b1a17" stroke="none" text-anchor="middle">f( , )</text>
    <!-- big question mark above gate -->
    <path d="M636 92 a22 22 0 1 1 24 28 v12" stroke-width="3"/>
    <circle cx="660" cy="150" r="4" fill="#1b1a17"/>
    <!-- runner A (g) from left, leaning, motion lines -->
    <circle cx="200" cy="160" r="30"/>
    <path d="M200 190 L240 250"/>
    <path d="M200 215 L150 200"/>
    <path d="M200 215 L256 210"/>
    <path d="M240 250 L210 320"/>
    <path d="M240 250 L286 312"/>
    <line x1="120" y1="170" x2="160" y2="170" opacity="0.5" stroke-width="2.4"/>
    <line x1="110" y1="200" x2="150" y2="200" opacity="0.5" stroke-width="2.4"/>
    <text x="180" y="360" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none" text-anchor="middle">g()</text>
    <!-- runner B (h) from right, leaning left -->
    <circle cx="1000" cy="160" r="30"/>
    <path d="M1000 190 L960 250"/>
    <path d="M1000 215 L1050 200"/>
    <path d="M1000 215 L944 210"/>
    <path d="M960 250 L990 320"/>
    <path d="M960 250 L914 312"/>
    <line x1="1040" y1="170" x2="1080" y2="170" opacity="0.5" stroke-width="2.4"/>
    <line x1="1050" y1="200" x2="1090" y2="200" opacity="0.5" stroke-width="2.4"/>
    <text x="1020" y="360" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none" text-anchor="middle">h()</text>
  </g>
</svg>
