<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Integers — an odometer rolling past its maximum and overflowing">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="78" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- odometer body -->
    <rect x="380" y="160" width="440" height="130" rx="18"/>
    <!-- digit windows rolling 9 9 9 -> 0 0 0 -->
    <line x1="490" y1="160" x2="490" y2="290"/>
    <line x1="600" y1="160" x2="600" y2="290"/>
    <line x1="710" y1="160" x2="710" y2="290"/>
    <text x="435" y="248" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="64" fill="#1b1a17" stroke="none">0</text>
    <text x="545" y="248" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="64" fill="#1b1a17" stroke="none">0</text>
    <text x="655" y="248" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="64" fill="#1b1a17" stroke="none">0</text>
    <text x="765" y="248" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="64" fill="#1b1a17" stroke="none">0</text>
    <!-- up arrows: it just kept counting -->
    <path d="M435 150 l0 -40 m-14 14 l14 -14 l14 14" opacity="0.5" stroke-width="2.4"/>
    <path d="M765 150 l0 -40 m-14 14 l14 -14 l14 14" opacity="0.5" stroke-width="2.4"/>
    <!-- MAX marker spilling over -->
    <path d="M380 130 q220 -60 440 0" opacity="0.5" stroke-width="2.4"/>
    <!-- a small startled figure watching it wrap -->
    <circle cx="950" cy="200" r="30"/>
    <path d="M950 230 V310"/>
    <path d="M950 252 L905 220"/>
    <path d="M950 252 L995 220"/>
    <path d="M950 310 L918 375"/>
    <path d="M950 310 L982 375"/>
    <circle cx="942" cy="196" r="3" fill="#1b1a17"/>
    <circle cx="958" cy="196" r="3" fill="#1b1a17"/>
    <ellipse cx="950" cy="214" rx="6" ry="8"/>
  </g>
</svg>
