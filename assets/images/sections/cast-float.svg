<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Float to integer — scissors snipping the decimal part off a number, leaving the whole part">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="53" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- the float number kept -->
    <text x="200" y="270" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="120" fill="#1b1a17" stroke="none">3</text>
    <!-- dotted cut line right after the decimal point -->
    <path d="M330 110 V330" stroke-width="2.4" opacity="0.5" stroke-dasharray="8 12"/>
    <!-- the discarded fractional part, drifting away and faint -->
    <g opacity="0.5" stroke-width="2.4">
      <text x="380" y="270" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="120" fill="#1b1a17" stroke="none">.7</text>
    </g>
    <!-- falling-away arrow for the discarded fraction -->
    <path d="M520 300 q60 60 120 70" opacity="0.5" stroke-width="2.4"/>
    <path d="M640 370 L612 360 M640 370 L632 342" opacity="0.5" stroke-width="2.4"/>
    <!-- scissors at the cut line -->
    <circle cx="300" cy="118" r="20"/>
    <circle cx="342" cy="100" r="20"/>
    <path d="M286 132 L350 200"/>
    <path d="M328 116 L350 145 L330 210"/>
    <!-- result arrow to integer 3 -->
    <path d="M760 240 H900"/>
    <path d="M900 240 L872 220 M900 240 L872 260"/>
    <text x="930" y="280" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="120" fill="#1b1a17" stroke="none">3</text>
  </g>
</svg>
