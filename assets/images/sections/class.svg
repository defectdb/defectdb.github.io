<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Classes — a figure presenting a class box with member rows">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- class box -->
    <rect x="560" y="90" width="420" height="290" rx="14"/>
    <path d="M560 150 H980"/>
    <!-- title bar text -->
    <text x="600" y="135" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">class</text>
    <!-- member rows -->
    <path d="M600 195 H840"/>
    <circle cx="585" cy="195" r="6" fill="#1b1a17"/>
    <path d="M600 245 H900"/>
    <circle cx="585" cy="245" r="6" fill="#1b1a17"/>
    <path d="M600 295 H800"/>
    <circle cx="585" cy="295" r="6" fill="#1b1a17"/>
    <path d="M600 345 H870"/>
    <circle cx="585" cy="345" r="6" fill="#1b1a17"/>
    <!-- stick figure presenting -->
    <circle cx="250" cy="150" r="34"/>
    <path d="M232 145 a8 6 0 0 0 12 0 M256 145 a8 6 0 0 0 12 0"/>
    <path d="M242 168 a14 8 0 0 0 24 0"/>
    <path d="M250 184 V300"/>
    <path d="M250 220 L200 270"/>
    <path d="M250 220 L470 200"/>
    <path d="M470 200 L500 195"/>
    <path d="M250 300 L210 380"/>
    <path d="M250 300 L292 380"/>
  </g>
</svg>
