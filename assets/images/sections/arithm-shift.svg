<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Bit shift — bits slide left and tumble off the edge of a cliff">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="97" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- the register: a row of bit cells ending at a cliff edge on the left -->
    <rect x="430" y="230" width="540" height="80" rx="6"/>
    <line x1="520" y1="230" x2="520" y2="310"/>
    <line x1="610" y1="230" x2="610" y2="310"/>
    <line x1="700" y1="230" x2="700" y2="310"/>
    <line x1="790" y1="230" x2="790" y2="310"/>
    <line x1="880" y1="230" x2="880" y2="310"/>
    <!-- bits inside -->
    <line x1="565" y1="250" x2="565" y2="290"/>
    <line x1="655" y1="250" x2="655" y2="290"/>
    <line x1="835" y1="250" x2="835" y2="290"/>
    <line x1="925" y1="250" x2="925" y2="290"/>
    <!-- shift-left arrows above -->
    <path d="M640 190 h-160 m22 -16 l-22 16 l22 16" />
    <!-- the cliff edge at left and bits falling off -->
    <path d="M430 310 v90 h-60" opacity="0.5" stroke-width="2.4"/>
    <line x1="360" y1="300" x2="360" y2="340"/>
    <line x1="300" y1="350" x2="300" y2="390"/>
    <ellipse cx="250" cy="320" rx="11" ry="18"/>
    <!-- motion lines for the falling bit -->
    <path d="M360 300 q-18 30 -60 50" opacity="0.5" stroke-width="2.4"/>
    <path d="M250 300 q-10 20 0 40" opacity="0.5" stroke-width="2.4"/>
  </g>
</svg>
