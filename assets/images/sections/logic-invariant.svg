<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Invariants — a balance scale that was meant to stay level now tipped over, its beam cracked">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="97" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- central post and base -->
    <line x1="600" y1="120" x2="600" y2="330"/>
    <path d="M540 330 H660"/>
    <path d="M560 330 L530 380 H670 L640 330" opacity="0.7" stroke-width="2.6"/>
    <!-- fulcrum -->
    <circle cx="600" cy="120" r="10"/>
    <!-- tipped beam (broken invariant) with a crack at the pivot -->
    <line x1="430" y1="190" x2="600" y2="120"/>
    <line x1="600" y1="120" x2="770" y2="60"/>
    <!-- crack marks at the pivot -->
    <path d="M596 132 l-12 8 l8 8 l-10 8" opacity="0.7" stroke-width="2.4"/>
    <!-- heavy pan, down on the left -->
    <line x1="430" y1="190" x2="430" y2="240"/>
    <path d="M370 240 A60 30 0 0 0 490 240 Z"/>
    <!-- light pan, up on the right -->
    <line x1="770" y1="60" x2="770" y2="110"/>
    <path d="M710 110 A60 30 0 0 0 830 110 Z"/>
    <!-- the dotted ghost of where the beam SHOULD be (level) -->
    <line x1="430" y1="120" x2="770" y2="120" opacity="0.45" stroke-width="2.4" stroke-dasharray="9 11"/>
    <!-- alarm spark over the tipped side -->
    <path d="M430 150 l-18 -20 M430 150 l0 -28 M430 150 l18 -20" opacity="0.7" stroke-width="2.4"/>
    <!-- failed-check X mark -->
    <line x1="920" y1="170" x2="970" y2="220"/>
    <line x1="970" y1="170" x2="920" y2="220"/>
  </g>
</svg>
