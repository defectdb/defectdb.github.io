<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Allocation — a figure handed an empty box labelled zero">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- figure on left, puzzled -->
    <circle cx="250" cy="150" r="34"/>
    <path d="M250 184 V300"/>
    <path d="M250 215 L320 240"/>
    <path d="M250 215 L185 250"/>
    <path d="M250 300 L210 380"/>
    <path d="M250 300 L292 380"/>
    <path d="M236 158 a14 10 0 0 0 28 0"/>
    <!-- question mark above head -->
    <path d="M214 95 a16 16 0 1 1 16 22 v10"/>
    <circle cx="230" cy="135" r="2.4" fill="#1b1a17"/>
    <!-- empty open box (malloc(0)) -->
    <path d="M560 220 L760 220 L800 280 L600 280 Z"/>
    <path d="M560 220 L560 360 L600 410 L600 280"/>
    <path d="M760 220 L760 360 L800 410 L800 280 M600 410 L800 410"/>
    <!-- open flaps -->
    <path d="M560 220 L520 175 L700 175 L760 220"/>
    <path d="M760 220 L840 195 L780 250"/>
    <!-- big zero floating in/over the box -->
    <ellipse cx="680" cy="120" rx="48" ry="62"/>
    <!-- emptiness lines inside box -->
    <path d="M640 320 L720 330" opacity="0.5" stroke-width="2.4"/>
  </g>
</svg>
