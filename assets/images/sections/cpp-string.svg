<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Strings — with no null terminator the reader walks off the end of the buffer and over a cliff">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="131" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- the fixed buffer: a row of char cells, no terminator at the end -->
    <rect x="140" y="220" width="70" height="80" rx="6"/>
    <rect x="210" y="220" width="70" height="80" rx="6"/>
    <rect x="280" y="220" width="70" height="80" rx="6"/>
    <rect x="350" y="220" width="70" height="80" rx="6"/>
    <rect x="420" y="220" width="70" height="80" rx="6"/>
    <text x="160" y="275" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">H</text>
    <text x="232" y="275" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">e</text>
    <text x="300" y="275" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">l</text>
    <text x="370" y="275" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">l</text>
    <text x="440" y="275" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">o</text>
    <!-- the ground / edge of the buffer -->
    <path d="M120 320 H700"/>
    <path d="M700 320 V370" stroke-width="2.4" stroke-dasharray="9 10"/>
    <!-- reader keeps walking past the end, off the cliff -->
    <circle cx="800" cy="240" r="28" transform="rotate(30 800 240)"/>
    <path d="M812 264 L840 320" transform="rotate(20 820 290)"/>
    <path d="M790 260 L760 320 M810 262 L835 314" stroke-width="2.6"/>
    <path d="M780 230 L745 210 M820 230 L860 250" stroke-width="2.6"/>
    <!-- panic spark -->
    <path d="M860 180 l0 -26 M890 200 l22 -14 M832 200 l-22 -14" stroke-width="2.4"/>
    <!-- read pointer running off the boxes -->
    <path d="M490 410 H760" stroke-width="2.4" stroke-dasharray="8 10"/>
    <path d="M760 410 l-16 -9 M760 410 l-16 9" stroke-width="2.4"/>
  </g>
</svg>
