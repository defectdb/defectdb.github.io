<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Standard Library — a figure pulling a labelled book from a shelf of standard tools">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- bookshelf -->
    <rect x="560" y="80" width="520" height="300"/>
    <path d="M560 180 H1080 M560 280 H1080"/>
    <!-- shelf 1 books -->
    <rect x="580" y="100" width="34" height="80"/>
    <rect x="618" y="100" width="34" height="80"/>
    <rect x="656" y="108" width="30" height="72"/>
    <!-- a tilted book leaning -->
    <path d="M700 180 L720 104 L752 112 L732 180 Z"/>
    <rect x="900" y="100" width="34" height="80"/>
    <rect x="938" y="100" width="34" height="80"/>
    <rect x="976" y="100" width="34" height="80"/>
    <!-- shelf 2 books -->
    <rect x="580" y="200" width="34" height="80"/>
    <rect x="618" y="200" width="30" height="80"/>
    <rect x="652" y="200" width="34" height="80"/>
    <rect x="800" y="200" width="34" height="80"/>
    <rect x="838" y="200" width="34" height="80"/>
    <rect x="976" y="200" width="34" height="80"/>
    <!-- shelf 3 books -->
    <rect x="580" y="300" width="34" height="76"/>
    <rect x="618" y="300" width="34" height="76"/>
    <rect x="900" y="300" width="34" height="76"/>
    <rect x="938" y="300" width="34" height="76"/>
    <rect x="976" y="300" width="34" height="76"/>
    <!-- the pulled-out book in figure's hand -->
    <rect x="300" y="150" width="120" height="78" rx="4"/>
    <path d="M312 150 V228"/>
    <text x="330" y="200" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">std</text>
    <!-- stick figure reaching for book -->
    <circle cx="180" cy="150" r="32"/>
    <path d="M180 182 V300"/>
    <path d="M180 210 L300 190"/>
    <path d="M180 210 L130 270"/>
    <path d="M180 300 L140 380"/>
    <path d="M180 300 L222 380"/>
  </g>
</svg>
