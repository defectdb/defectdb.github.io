<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Exit — a thread leaves through a door while a forgotten bucket drips behind it, leaking">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="103" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- exit door on the right, a stick figure stepping out -->
    <rect x="900" y="110" width="200" height="290" rx="6"/>
    <path d="M960 110 V400"/>
    <text x="905" y="95" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">exit()</text>
    <!-- figure halfway out the door, waving -->
    <circle cx="860" cy="170" r="30"/>
    <path d="M860 200 V300"/>
    <path d="M860 225 L800 215"/>
    <path d="M860 225 L915 200"/>
    <path d="M860 300 L820 380"/>
    <path d="M860 300 L900 380"/>
    <!-- forgotten leaking bucket (memory) left behind -->
    <path d="M250 200 L330 200 L318 320 L262 320 Z"/>
    <path d="M250 200 q40 -22 80 0"/>
    <!-- handle -->
    <path d="M262 205 q28 -50 56 0"/>
    <!-- drips from the bucket -->
    <path d="M290 320 q-4 24 0 40 q6 -16 0 -40" fill="#1b1a17"/>
    <path d="M290 380 q-3 18 0 30 q5 -12 0 -30" fill="#1b1a17"/>
    <path d="M340 300 q-3 18 0 30 q5 -12 0 -30" fill="#1b1a17"/>
    <!-- a small leak label / puddle -->
    <path d="M255 410 q40 14 90 0" opacity="0.5" stroke-width="2.4"/>
  </g>
</svg>
