<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Types — shaped slots for int float and bool, a value dropping into one">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- shape sorter board -->
    <rect x="300" y="250" width="600" height="120" rx="16"/>
    <!-- square slot -->
    <rect x="360" y="290" width="64" height="64" rx="6"/>
    <!-- round slot -->
    <circle cx="600" cy="322" r="34"/>
    <!-- triangle slot -->
    <path d="M820 354 L780 290 L860 290 Z"/>
    <!-- value (square block) being assigned, dropping in with arrow -->
    <rect x="360" y="120" width="64" height="64" rx="6"/>
    <path d="M392 195 V250"/>
    <path d="M392 250 L380 228 M392 250 L404 228"/>
    <!-- hand from above releasing -->
    <path d="M392 100 a16 16 0 0 1 0 -10"/>
    <text x="320" y="410" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="26" fill="#1b1a17" stroke="none">int</text>
    <text x="566" y="410" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="26" fill="#1b1a17" stroke="none">float</text>
    <text x="788" y="410" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="26" fill="#1b1a17" stroke="none">bool</text>
  </g>
</svg>
