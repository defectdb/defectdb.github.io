<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Entry point — a wrong-shaped key that will not fit the main keyhole">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="42" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- the main() slot: a panel with a keyhole shaped opening -->
    <rect x="650" y="90" width="330" height="270" rx="14"/>
    <text x="815" y="140" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">main()</text>
    <!-- keyhole opening (the expected signature) -->
    <circle cx="815" cy="220" r="34"/>
    <path d="M815 250 L795 320 H835 Z"/>
    <!-- a mismatched key being offered (wrong signature) -->
    <circle cx="300" cy="220" r="48"/>
    <circle cx="300" cy="220" r="18"/>
    <path d="M348 220 H560"/>
    <!-- key bit is the WRONG shape: square teeth that won't fit a round hole -->
    <rect x="500" y="208" width="26" height="40"/>
    <rect x="535" y="208" width="26" height="40"/>
    <!-- no entry / mismatch mark -->
    <circle cx="600" cy="220" r="40"/>
    <path d="M572 192 L628 248"/>
  </g>
</svg>
