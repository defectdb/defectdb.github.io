<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Assignments — a figure forcing a square peg into a round hole">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="42" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- board with round hole -->
    <rect x="700" y="150" width="260" height="200" rx="14"/>
    <circle cx="830" cy="250" r="60"/>
    <!-- square peg jammed at the hole -->
    <rect x="560" y="200" width="110" height="110" rx="6"/>
    <path d="M670 255 H700"/>
    <!-- mismatch sparks -->
    <path d="M700 210 l18 -14 M712 250 h24 M700 295 l18 14"/>
    <!-- struggling figure pushing -->
    <circle cx="250" cy="160" r="34"/>
    <path d="M232 168 a8 5 0 0 1 14 -2"/>
    <path d="M250 194 L300 250"/>
    <path d="M300 250 L470 250"/>
    <path d="M470 250 L560 255"/>
    <path d="M250 194 L235 280"/>
    <path d="M235 280 L300 250"/>
    <path d="M235 280 L200 360"/>
    <path d="M235 280 L270 360"/>
  </g>
</svg>
