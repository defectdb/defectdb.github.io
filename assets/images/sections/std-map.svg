<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Map — a figure unrolls a treasure map that is completely blank, marked with a void symbol">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="83" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- unrolled map sheet with curled ends -->
    <path d="M420 130 q-40 130 0 260 q120 -30 360 0 q40 -130 0 -260 q-180 30 -360 0 Z"/>
    <!-- curled roll on the left -->
    <path d="M420 130 q-50 130 0 260" />
    <path d="M404 150 q-26 110 0 220" opacity="0.5" stroke-width="2.4"/>
    <!-- curled roll on the right -->
    <path d="M780 130 q50 130 0 260"/>
    <path d="M796 150 q26 110 0 220" opacity="0.5" stroke-width="2.4"/>
    <!-- big void / null symbol where the map should be -->
    <ellipse cx="600" cy="260" rx="80" ry="90"/>
    <path d="M540 195 L660 325"/>
    <!-- stick figure peering at blank map -->
    <circle cx="960" cy="150" r="32"/>
    <path d="M960 182 V300"/>
    <path d="M960 210 L860 240"/>
    <path d="M960 210 L1015 255"/>
    <path d="M960 300 L925 380"/>
    <path d="M960 300 L1000 380"/>
  </g>
</svg>
