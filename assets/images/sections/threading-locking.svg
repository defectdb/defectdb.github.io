<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Locking — two padlocks, one locked and one hanging open, beside a shared box">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="97" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- shared resource box in the middle -->
    <rect x="500" y="180" width="200" height="160" rx="10"/>
    <text x="600" y="275" text-anchor="middle" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">data</text>
    <!-- left: properly locked padlock -->
    <rect x="200" y="190" width="150" height="120" rx="16"/>
    <path d="M230 190 V150 a45 45 0 0 1 90 0 V190"/>
    <path d="M275 235 a15 15 0 1 1 0 1" />
    <path d="M275 250 V285" stroke-width="3.2"/>
    <!-- right: padlock hanging OPEN (inconsistent / missing locking) -->
    <rect x="850" y="190" width="150" height="120" rx="16"/>
    <path d="M880 190 V150 a45 45 0 0 1 90 0" />
    <path d="M970 150 V120" />
    <!-- alarm sparks around the open one -->
    <path d="M820 150 L795 135 M1020 150 L1045 135 M820 330 L795 345" opacity="0.5" stroke-width="2.4"/>
    <!-- question mark over the gap -->
    <path d="M620 120 a18 18 0 1 1 18 24 V160" />
    <circle cx="638" cy="180" r="3" fill="#1b1a17"/>
  </g>
</svg>
