<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="SizeOf operations — a tape measure wrapping a tiny pointer arrow while a big array stands unmeasured">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- ruler over a tiny box (the pointer), being measured -->
    <rect x="300" y="220" width="70" height="70" rx="8"/>
    <!-- arrow showing this is just a pointer -->
    <line x1="260" y1="255" x2="300" y2="255"/>
    <path d="M300 255 L286 246 M300 255 L286 264"/>
    <!-- ruler with ticks measuring the tiny box -->
    <rect x="280" y="150" width="120" height="40" rx="4"/>
    <line x1="300" y1="150" x2="300" y2="172"/>
    <line x1="320" y1="150" x2="320" y2="165"/>
    <line x1="340" y1="150" x2="340" y2="172"/>
    <line x1="360" y1="150" x2="360" y2="165"/>
    <line x1="380" y1="150" x2="380" y2="172"/>
    <!-- the BIG thing it should have measured, unmeasured -->
    <rect x="640" y="120" width="360" height="220" rx="14"/>
    <line x1="700" y1="120" x2="700" y2="340" opacity="0.5" stroke-width="2.4"/>
    <line x1="760" y1="120" x2="760" y2="340" opacity="0.5" stroke-width="2.4"/>
    <line x1="820" y1="120" x2="820" y2="340" opacity="0.5" stroke-width="2.4"/>
    <line x1="880" y1="120" x2="880" y2="340" opacity="0.5" stroke-width="2.4"/>
    <line x1="940" y1="120" x2="940" y2="340" opacity="0.5" stroke-width="2.4"/>
    <!-- figure pointing confused from tiny to big -->
    <circle cx="500" cy="120" r="30"/>
    <path d="M500 150 V250"/>
    <path d="M500 178 L560 160"/>
    <path d="M500 178 L440 200"/>
    <path d="M500 250 L466 330"/>
    <path d="M500 250 L536 330"/>
    <path d="M486 120 q14 -12 28 0" opacity="0.5" stroke-width="2.4"/>
    <text x="335" y="335" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="28" fill="#1b1a17" stroke="none" text-anchor="middle">sizeof</text>
  </g>
</svg>
