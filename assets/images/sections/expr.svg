<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Expressions — a figure feeding parentheses and operators into a calculating machine">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="41" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- chalkboard with an expression -->
    <rect x="380" y="90" width="520" height="220" rx="14"/>
    <rect x="400" y="110" width="480" height="180" rx="8" opacity="0.5" stroke-width="2.4"/>
    <line x1="400" y1="316" x2="880" y2="316"/>
    <text x="640" y="220" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="64" fill="#1b1a17" stroke="none" text-anchor="middle">(a + b) * c</text>
    <!-- figure pondering -->
    <circle cx="200" cy="150" r="34"/>
    <path d="M200 184 V300"/>
    <path d="M200 215 L150 260"/>
    <path d="M200 215 L268 188"/>
    <path d="M268 188 L300 178"/>
    <path d="M200 300 L160 380"/>
    <path d="M200 300 L242 380"/>
    <path d="M186 150 q14 12 28 0" opacity="0.5" stroke-width="2.4"/>
    <!-- thought bubble of a question -->
    <circle cx="1010" cy="160" r="60"/>
    <circle cx="940" cy="240" r="14" opacity="0.6" stroke-width="2.4"/>
    <circle cx="915" cy="280" r="8" opacity="0.6" stroke-width="2.4"/>
    <path d="M996 140 a18 18 0 1 1 20 22 v10" stroke-width="2.8"/>
    <circle cx="1016" cy="190" r="4" fill="#1b1a17"/>
  </g>
</svg>
