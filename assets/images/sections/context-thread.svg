<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Threads — two stick figures connected by a thread, one at a printer one with a scanner">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="31" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- left figure: printing -->
    <circle cx="270" cy="120" r="32"/>
    <path d="M270 152 V250"/>
    <path d="M270 180 L210 220 M270 180 L340 200"/>
    <path d="M270 250 L235 350 M270 250 L305 350"/>
    <!-- printer -->
    <rect x="380" y="250" width="150" height="90" rx="8"/>
    <path d="M400 250 V210 H510 V250"/>
    <rect x="410" y="345" width="90" height="50"/>
    <path d="M420 360 H490 M420 375 H470"/>
    <!-- right figure: scanning -->
    <circle cx="930" cy="120" r="32"/>
    <path d="M930 152 V250"/>
    <path d="M930 180 L990 220 M930 180 L860 200"/>
    <path d="M930 250 L895 350 M930 250 L965 350"/>
    <!-- magnifier (scanner) -->
    <circle cx="790" cy="270" r="34"/>
    <path d="M766 294 L720 340"/>
    <!-- spool of thread between them -->
    <ellipse cx="600" cy="170" rx="46" ry="26"/>
    <path d="M560 158 H640 M558 182 H642"/>
    <!-- the shared 'thread' line to both heads -->
    <path d="M340 200 C480 150 530 165 560 168" opacity="0.6" stroke-width="2.6"/>
    <path d="M640 168 C720 165 760 150 860 200" opacity="0.6" stroke-width="2.6"/>
  </g>
</svg>
