<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Static — an empty pedestal labelled static awaiting its required initial value">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="129" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- pedestal -->
    <path d="M560 380 H760"/>
    <rect x="585" y="320" width="150" height="60" rx="6"/>
    <rect x="600" y="270" width="120" height="50" rx="6"/>
    <text x="605" y="305" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="26" fill="#1b1a17" stroke="none">static</text>
    <!-- empty top plate (no statue/value) dashed -->
    <rect x="610" y="200" width="100" height="60" rx="8" stroke-dasharray="11 11"/>
    <text x="648" y="245" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="40" fill="#1b1a17" stroke="none">?</text>
    <!-- a value block waiting on a dolly to be placed -->
    <rect x="240" y="240" width="120" height="100" rx="8"/>
    <text x="282" y="305" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="42" fill="#1b1a17" stroke="none">0</text>
    <!-- arrow: must be initialized -->
    <path d="M380 250 C470 200 520 200 600 215"/>
    <path d="M600 215 L572 208 M600 215 L580 234"/>
    <!-- spark of urgency over pedestal -->
    <path d="M660 175 v-26 M642 160 l-16 -10 M678 160 l16 -10" opacity="0.5" stroke-width="2.4"/>
  </g>
</svg>
