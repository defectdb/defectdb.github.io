<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Threading — three parallel thread-spools running side by side">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="75" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- three threads of yarn running in parallel, slightly tangled -->
    <path d="M150 120 C400 80 800 200 1060 120"/>
    <path d="M150 220 C420 280 760 140 1060 220"/>
    <path d="M150 320 C400 260 800 360 1060 320"/>
    <!-- spools at the left (the thread source) -->
    <ellipse cx="150" cy="120" rx="16" ry="26"/>
    <ellipse cx="150" cy="220" rx="16" ry="26"/>
    <ellipse cx="150" cy="320" rx="16" ry="26"/>
    <!-- needles at the right ends -->
    <circle cx="1060" cy="120" r="10"/>
    <circle cx="1060" cy="220" r="10"/>
    <circle cx="1060" cy="320" r="10"/>
    <!-- a little crossing knot in the middle hinting at locking/sync -->
    <circle cx="600" cy="220" r="6" fill="#1b1a17"/>
  </g>
</svg>
