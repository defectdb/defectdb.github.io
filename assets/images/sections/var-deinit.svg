<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Deinitialization — a loop arrow piling up unfired defer tickets">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="78" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- big loop arrow -->
    <path d="M360 130 a150 150 0 1 0 110 40"/>
    <path d="M470 170 L452 135 M470 170 L432 178"/>
    <text x="250" y="270" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">loop</text>
    <!-- growing stack of defer tickets (none closed yet) -->
    <rect x="720" y="330" width="260" height="44" rx="6"/>
    <text x="745" y="362" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="24" fill="#1b1a17" stroke="none">defer close()</text>
    <rect x="730" y="282" width="260" height="44" rx="6"/>
    <text x="755" y="314" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="24" fill="#1b1a17" stroke="none">defer close()</text>
    <rect x="740" y="234" width="260" height="44" rx="6"/>
    <text x="765" y="266" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="24" fill="#1b1a17" stroke="none">defer close()</text>
    <rect x="750" y="186" width="260" height="44" rx="6"/>
    <text x="775" y="218" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="24" fill="#1b1a17" stroke="none">defer close()</text>
    <!-- teetering top, more dots indicating endless pile -->
    <path d="M860 168 v-22 M848 150 h24" opacity="0.5" stroke-width="2.4"/>
    <!-- arrow from loop feeding the pile -->
    <path d="M540 250 H700"/>
    <path d="M700 250 L676 238 M700 250 L676 262"/>
  </g>
</svg>
