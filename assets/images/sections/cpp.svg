<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="C++ — a juggler keeping bombs, gears, ghosts and pointers in the air">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- juggler -->
    <circle cx="600" cy="250" r="34"/>
    <path d="M600 284 V370"/>
    <path d="M600 305 L540 250"/>
    <path d="M600 305 L660 250"/>
    <path d="M600 370 L560 420" />
    <path d="M600 370 L642 420"/>
    <!-- juggling arc -->
    <path d="M470 220 Q600 60 730 220" stroke-width="2.4" opacity="0.5"/>
    <!-- bomb -->
    <circle cx="470" cy="200" r="24"/>
    <path d="M486 184 q14 -14 6 -28"/>
    <path d="M492 156 l8 -8 M500 160 l8 -6 M488 150 l2 -10" stroke-width="2.4"/>
    <!-- gear -->
    <circle cx="540" cy="95" r="22"/>
    <circle cx="540" cy="95" r="8"/>
    <path d="M540 73 V63 M540 117 V127 M518 95 H508 M562 95 H572 M524 79 L517 72 M556 111 L563 118 M556 79 L563 72 M524 111 L517 118" stroke-width="2.4"/>
    <!-- ghost -->
    <path d="M638 110 V80 a26 30 0 0 1 52 0 V110 l-9 -11 -9 11 -8 -11 -9 11 -9 -11 z"/>
    <circle cx="652" cy="82" r="3.5" fill="#1b1a17"/>
    <circle cx="676" cy="82" r="3.5" fill="#1b1a17"/>
    <!-- pointer arrow -->
    <path d="M712 198 H766"/>
    <path d="M766 198 l-14 -9 M766 198 l-14 9"/>
    <text x="690" y="412" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">C++</text>
  </g>
</svg>
