<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Qualifiers — a box wearing a hanging tag labelled const">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="59" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- the value box -->
    <rect x="470" y="180" width="220" height="180" rx="16"/>
    <text x="580" y="290" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="64" fill="#1b1a17" stroke="none" text-anchor="middle">x</text>
    <!-- string from box corner up to the tag -->
    <path d="M690 200 Q740 150 770 130"/>
    <!-- hanging luggage tag with a hole -->
    <path d="M770 110 L900 90 L990 130 L900 200 L770 180 Z"/>
    <circle cx="800" cy="130" r="9"/>
    <text x="900" y="160" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="38" fill="#1b1a17" stroke="none" text-anchor="middle">const</text>
    <!-- figure presenting the tagged box -->
    <circle cx="240" cy="160" r="32"/>
    <path d="M240 192 V300"/>
    <path d="M240 220 L300 198"/>
    <path d="M240 220 L190 250"/>
    <path d="M240 300 L206 376"/>
    <path d="M240 300 L278 376"/>
    <path d="M226 160 q14 -12 28 0" opacity="0.5" stroke-width="2.4"/>
  </g>
</svg>
