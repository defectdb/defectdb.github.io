<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="GC Misuse — an overloaded garbage bin overflowing with objects">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- overflowing bin -->
    <path d="M450 230 L470 410 H730 L750 230 Z"/>
    <path d="M430 230 H770"/>
    <!-- piled mountain of crumpled objects overflowing -->
    <circle cx="520" cy="190" r="24"/>
    <circle cx="600" cy="160" r="28"/>
    <circle cx="680" cy="190" r="24"/>
    <circle cx="560" cy="120" r="20"/>
    <circle cx="640" cy="115" r="22"/>
    <!-- ones spilling over the sides -->
    <circle cx="430" cy="280" r="18"/>
    <circle cx="772" cy="290" r="18"/>
    <circle cx="400" cy="350" r="16"/>
    <!-- straining stick figure pushing more in -->
    <circle cx="930" cy="150" r="32"/>
    <path d="M912 168 a18 8 0 0 0 36 0"/>
    <path d="M930 182 V300"/>
    <path d="M930 210 L850 230"/>
    <path d="M930 210 L1000 200"/>
    <path d="M930 300 L895 390"/>
    <path d="M930 300 L968 390"/>
    <!-- sweat drops of strain -->
    <path d="M895 110 q-6 12 0 16 q6 -4 0 -16" fill="#1b1a17"/>
    <!-- speed lines of too much input -->
    <path d="M1060 150 L1010 165 M1075 190 L1015 195" opacity="0.5" stroke-width="2.4"/>
  </g>
</svg>
