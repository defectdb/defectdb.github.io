<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Members — a class box where one member row is blank and unknown">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="23" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- class box -->
    <rect x="430" y="80" width="420" height="300" rx="14"/>
    <path d="M430 138 H850"/>
    <text x="468" y="123" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="28" fill="#1b1a17" stroke="none">class</text>
    <!-- filled members -->
    <circle cx="460" cy="185" r="6" fill="#1b1a17"/>
    <path d="M480 185 H560"/>
    <rect x="600" y="172" width="60" height="26" rx="5"/>
    <text x="615" y="192" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="22" fill="#1b1a17" stroke="none">7</text>
    <circle cx="460" cy="245" r="6" fill="#1b1a17"/>
    <path d="M480 245 H560"/>
    <rect x="600" y="232" width="60" height="26" rx="5"/>
    <path d="M613 245 H648"/>
    <!-- the uninitialized member: empty dashed box + ? -->
    <circle cx="460" cy="320" r="6" fill="#1b1a17"/>
    <path d="M480 320 H560"/>
    <rect x="600" y="300" width="120" height="50" rx="6" stroke-dasharray="10 10"/>
    <text x="640" y="338" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="34" fill="#1b1a17" stroke="none">?</text>
    <!-- confused figure looking -->
    <circle cx="1000" cy="170" r="34"/>
    <path d="M984 178 a8 5 0 0 1 12 0"/>
    <path d="M1000 204 V310"/>
    <path d="M1000 235 L950 250"/>
    <path d="M1000 235 L1055 215"/>
    <path d="M1000 310 L965 385"/>
    <path d="M1000 310 L1038 385"/>
    <text x="1050" y="115" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="40" fill="#1b1a17" stroke="none">?</text>
  </g>
</svg>
