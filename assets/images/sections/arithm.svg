<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Arithmetic — a figure at a chalkboard full of math operators">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- chalkboard -->
    <rect x="500" y="70" width="500" height="280" rx="14"/>
    <rect x="520" y="90" width="460" height="240" rx="8" opacity="0.5" stroke-width="2.4"/>
    <line x1="520" y1="356" x2="980" y2="356"/>
    <!-- plus -->
    <line x1="580" y1="160" x2="640" y2="160"/>
    <line x1="610" y1="130" x2="610" y2="190"/>
    <!-- minus -->
    <line x1="700" y1="160" x2="760" y2="160"/>
    <!-- times -->
    <line x1="820" y1="135" x2="880" y2="185"/>
    <line x1="880" y1="135" x2="820" y2="185"/>
    <!-- divide -->
    <line x1="580" y1="270" x2="640" y2="270"/>
    <circle cx="610" cy="250" r="5" fill="#1b1a17"/>
    <circle cx="610" cy="290" r="5" fill="#1b1a17"/>
    <!-- equals + question -->
    <line x1="700" y1="258" x2="760" y2="258"/>
    <line x1="700" y1="282" x2="760" y2="282"/>
    <path d="M820 250 a26 26 0 1 1 26 32 v14"/>
    <circle cx="846" cy="306" r="4" fill="#1b1a17"/>
    <!-- figure pointing -->
    <circle cx="250" cy="150" r="34"/>
    <path d="M250 184 V300"/>
    <path d="M250 215 L320 180"/>
    <path d="M250 215 L190 260"/>
    <path d="M250 300 L210 380"/>
    <path d="M250 300 L292 380"/>
    <path d="M320 180 L380 170"/>
    <path d="M236 150 q14 14 28 0" opacity="0.5" stroke-width="2.4"/>
  </g>
</svg>
