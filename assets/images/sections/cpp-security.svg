<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Security — a magician swaps the safe card for a bomb between the moment of check and the moment of use">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="121" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- CHECK: an eye inspecting a card marked OK -->
    <path d="M120 180 q60 -50 120 0 q-60 50 -120 0" />
    <circle cx="180" cy="180" r="20"/>
    <circle cx="180" cy="180" r="7" fill="#1b1a17"/>
    <rect x="140" y="240" width="90" height="120" rx="8"/>
    <path d="M158 300 l16 18 l30 -40" stroke-width="2.6"/>
    <text x="150" y="395" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">check</text>
    <!-- arrow of time -->
    <path d="M250 300 H400" stroke-dasharray="9 11"/>
    <path d="M400 300 l-16 -10 M400 300 l-16 10"/>
    <!-- SWAP: a sneaky hand swapping the card -->
    <path d="M470 200 q60 -30 120 30 q-30 20 -60 10 q-40 -10 -60 -40 z"/>
    <path d="M520 240 l10 30 M545 250 l8 28 M568 250 l4 28" stroke-width="2.4"/>
    <path d="M560 200 Q650 150 720 210" stroke-width="2.4" stroke-dasharray="7 9"/>
    <!-- arrow of time -->
    <path d="M620 300 H770" stroke-dasharray="9 11"/>
    <path d="M770 300 l-16 -10 M770 300 l-16 10"/>
    <!-- USE: the card is now a bomb -->
    <rect x="830" y="240" width="90" height="120" rx="8"/>
    <circle cx="875" cy="300" r="26"/>
    <path d="M893 282 q12 -12 4 -26 M897 256 l8 -8 M889 254 l2 -10" stroke-width="2.4"/>
    <text x="840" y="395" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">use</text>
  </g>
</svg>
