<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Interfaces — a plug and cable reaching toward an empty void socket">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="84" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- interface label -->
    <text x="180" y="160" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">interface</text>
    <!-- plug body -->
    <rect x="200" y="200" width="150" height="100" rx="14"/>
    <!-- prongs -->
    <path d="M350 230 H410 M350 270 H410"/>
    <!-- cable trailing back -->
    <path d="M200 250 C120 250 120 360 200 360"/>
    <!-- the void it points to: empty dashed socket + Ø -->
    <rect x="640" y="190" width="220" height="120" rx="14" stroke-dasharray="12 12"/>
    <circle cx="750" cy="250" r="44"/>
    <path d="M718 282 L782 218"/>
    <!-- gap with question mark -->
    <path d="M420 250 H600" stroke-dasharray="14 14"/>
    <text x="490" y="200" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="40" fill="#1b1a17" stroke="none">?</text>
    <text x="900" y="285" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="28" fill="#1b1a17" stroke="none">null</text>
  </g>
</svg>
