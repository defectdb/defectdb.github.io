<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" fill="none" role="img" aria-label="Memory — a round deallocator peg will not fit the square allocation hole: mismatched new and delete">
  <defs>
    <filter id="rough" x="-6%" y="-6%" width="112%" height="112%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="101" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <g filter="url(#rough)" stroke="#1b1a17" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- the allocation: a square hole, made by new[] -->
    <rect x="640" y="170" width="200" height="200" rx="6"/>
    <rect x="690" y="220" width="100" height="100" rx="4"/>
    <text x="650" y="155" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">new[]</text>
    <!-- the wrong-shaped deallocator: a round peg, free() -->
    <circle cx="300" cy="270" r="70"/>
    <text x="250" y="380" font-family="'Comic Sans MS','Chalkboard SE','Comic Neue',cursive" font-size="30" fill="#1b1a17" stroke="none">free()</text>
    <!-- trying to insert it -->
    <path d="M380 270 H600"/>
    <path d="M600 270 l-16 -10 M600 270 l-16 10"/>
    <!-- mismatch spark at the boundary -->
    <path d="M640 270 l-26 -26 M640 270 l-26 26 M620 270 l-30 0 M650 230 l-10 -26 M650 310 l-10 26" stroke-width="2.6"/>
  </g>
</svg>
